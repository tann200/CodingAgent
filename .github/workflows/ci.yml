name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # P3-4: Nightly integration test run at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Run integration tests (requires local provider)'
        required: false
        default: 'false'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        python-version: [3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '${{ matrix.python-version }}'
      - name: Assert Python requirement in pyproject
        run: |
          python - <<'PY'
          import sys, pathlib
          try:
              import tomllib
          except Exception:
              print('tomllib not available in this Python environment')
              sys.exit(1)

          p = pathlib.Path('pyproject.toml')
          if not p.exists():
              print('pyproject.toml not found')
              sys.exit(1)

          data = tomllib.loads(p.read_text())
          proj = data.get('project', {}) if isinstance(data, dict) else {}
          spec = proj.get('requires-python')
          if not spec:
              print('project.requires-python not set in pyproject.toml')
              sys.exit(1)

          # Require that 3.11 is present in the spec (and recommend pinning to <3.12)
          if '3.11' not in str(spec):
              print(f"project.requires-python ('{spec}') does not include Python 3.11. CI requires Python 3.11.")
              sys.exit(1)

          if '<3.12' not in str(spec) and '==3.11' not in str(spec):
              print(f"Warning: project.requires-python is '{spec}'. Recommended: '>=3.11,<3.12' to lock to 3.11.x")
          print('pyproject Python requirement OK:', spec)
          PY
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install -e .[dev]
      - name: Lint (ruff)
        run: |
          pip install ruff --quiet
          python -m ruff check src/ --select=E,F,W --ignore=E501 || true
      - name: Type check (mypy)
        run: |
          pip install mypy --quiet
          python -m mypy src/ --ignore-missing-imports --no-error-summary || true
      - name: Run unit tests
        run: |
          python -m pytest tests/unit -q -p no:logging --cov=src --cov-report=term-missing --cov-report=xml
        env:
          CI: "true"
      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
      - name: Run e2e tests
        run: |
          python -m pytest tests/e2e -q -p no:logging
        env:
          CI: "true"
      - name: Run benchmark tests (ET-3)
        run: |
          python -m pytest tests/benchmarks -q -p no:logging
        env:
          CI: "true"
      - name: Run integration tests (optional)
        if: ${{ env.RUN_INTEGRATION == '1' || github.event_name == 'schedule' || github.event.inputs.run_integration == 'true' }}
        run: |
          RUN_INTEGRATION=1 python -m pytest tests/integration -q
        env:
          CI: "true"
