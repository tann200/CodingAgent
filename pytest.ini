[pytest]
minversion = 6.0
norecursedirs = .venv scripts
addopts = -q -r a
markers =
    integration: mark test as integration (needs RUN_INTEGRATION=1 and a running Ollama)
    lmstudio: mark test as requiring LM Studio provider
    ollama: mark test as requiring Ollama provider
filterwarnings =
    ignore::urllib3.exceptions.NotOpenSSLWarning
    ignore::RuntimeWarning
    ignore:coroutine 'App.call_from_thread.<locals>.run_callback' was never awaited:RuntimeWarning
